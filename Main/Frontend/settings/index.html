<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — CMS</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/aira.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">CMS <span>College Management</span></div>
            </div>
            <nav class="sidebar-nav"></nav>
        </aside>
        <div class="main-content">
            <header class="header" id="page-header"></header>
            <main class="page-content">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('llm')">🤖 AIRA / LLM Config</button>
                    <button class="tab-btn" onclick="switchTab('college')">🏛️ College Info</button>
                    <button class="tab-btn" onclick="switchTab('password')">🔒 Change Password</button>
                </div>

                <!-- LLM Config Tab -->
                <div id="tab-llm">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">🤖 AIRA LLM Configuration</h3>
                        </div>
                        <div class="card-body">
                            <form id="llm-form">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Provider</label>
                                        <select name="provider" class="form-control" id="llm-provider"
                                            onchange="toggleApiKey()">
                                            <option value="ollama">Ollama (Local)</option>
                                            <option value="gemini">Google Gemini</option>
                                            <option value="openai">OpenAI</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Model</label>
                                        <input type="text" name="selected_model" class="form-control" id="llm-model"
                                            placeholder="e.g. gemma3:1b, gemini-1.5-flash">
                                    </div>
                                </div>
                                <div class="form-group" id="api-key-group">
                                    <label class="form-label">API Key</label>
                                    <input type="password" name="api_key" class="form-control"
                                        placeholder="Enter API key (leave blank to keep existing)">
                                    <div class="form-hint">Only required for Gemini and OpenAI providers.</div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Temperature</label>
                                        <input type="number" name="temperature" class="form-control" id="llm-temp"
                                            min="0" max="2" step="0.1" value="0.7">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Max Tokens</label>
                                        <input type="number" name="max_tokens" class="form-control" id="llm-tokens"
                                            value="2048">
                                    </div>
                                </div>
                                <div class="alert alert-info">
                                    ℹ️ For Ollama, make sure Ollama is running locally at
                                    <code>http://localhost:11434</code>. Pull a model with
                                    <code>ollama pull gemma3:1b</code>.
                                </div>
                                <button type="button" class="btn btn-primary" onclick="saveLLMConfig()">💾 Save LLM
                                    Config</button>
                                <button type="button" class="btn btn-ghost" onclick="testLLM()">🧪 Test
                                    Connection</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- College Info Tab -->
                <div id="tab-college" style="display:none">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">🏛️ College Information</h3>
                        </div>
                        <div class="card-body">
                            <form id="college-form">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">College Name</label>
                                        <input type="text" name="name" class="form-control" id="college-name">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">College Code</label>
                                        <input type="text" name="code" class="form-control" id="college-code">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Phone</label>
                                        <input type="text" name="phone" class="form-control" id="college-phone">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Email</label>
                                        <input type="email" name="email" class="form-control" id="college-email">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Address</label>
                                    <textarea name="address" class="form-control" id="college-address"
                                        rows="3"></textarea>
                                </div>
                                <button type="button" class="btn btn-primary" onclick="saveCollege()">💾 Save College
                                    Info</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Change Password Tab -->
                <div id="tab-password" style="display:none">
                    <div class="card" style="max-width:480px">
                        <div class="card-header">
                            <h3 class="card-title">🔒 Change Password</h3>
                        </div>
                        <div class="card-body">
                            <form id="password-form">
                                <div class="form-group">
                                    <label class="form-label">Current Password</label>
                                    <input type="password" name="old_password" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">New Password</label>
                                    <input type="password" name="new_password" class="form-control" required
                                        minlength="8">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Confirm New Password</label>
                                    <input type="password" id="confirm-password" class="form-control" required>
                                </div>
                                <button type="button" class="btn btn-primary" onclick="changePassword()">🔒 Change
                                    Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script src="../assets/js/aira.js"></script>
    <script>
        auth.requireAuth();
        renderSidebar('settings');
        renderHeader('Settings', 'System configuration');

        function switchTab(tab) {
            ['llm', 'college', 'password'].forEach(t => {
                document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
            });
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                b.classList.toggle('active', ['llm', 'college', 'password'][i] === tab);
            });
        }

        function toggleApiKey() {
            const provider = document.getElementById('llm-provider').value;
            document.getElementById('api-key-group').style.display = provider === 'ollama' ? 'none' : '';
            const models = { ollama: 'gemma3:1b', gemini: 'gemini-1.5-flash', openai: 'gpt-4o-mini' };
            document.getElementById('llm-model').placeholder = `e.g. ${models[provider] || 'model-name'}`;
        }

        async function init() {
            const [llmRes, colRes] = await Promise.all([api.get('/aira/config'), api.get('/college/')]);
            if (llmRes?.ok && llmRes.data.data) {
                const c = llmRes.data.data;
                document.getElementById('llm-provider').value = c.provider || 'ollama';
                document.getElementById('llm-model').value = c.selected_model || '';
                document.getElementById('llm-temp').value = c.temperature || 0.7;
                document.getElementById('llm-tokens').value = c.max_tokens || 2048;
                toggleApiKey();
            }
            if (colRes?.ok && colRes.data.data?.length) {
                const col = colRes.data.data[0];
                document.getElementById('college-name').value = col.name || '';
                document.getElementById('college-code').value = col.code || '';
                document.getElementById('college-phone').value = col.phone || '';
                document.getElementById('college-email').value = col.email || '';
                document.getElementById('college-address').value = col.address || '';
            }
        }

        async function saveLLMConfig() {
            const data = utils.getFormData('llm-form');
            const res = await api.post('/aira/config', data);
            if (res?.ok) utils.toast('LLM config saved!', 'success');
            else utils.toast(res?.data?.message || 'Failed', 'error');
        }

        async function testLLM() {
            utils.toast('Testing connection...', 'info');
            const res = await api.get('/aira/test');
            if (res?.ok) utils.toast('✅ Connection successful!', 'success');
            else utils.toast('❌ Connection failed. Check your config.', 'error');
        }

        async function saveCollege() {
            const data = utils.getFormData('college-form');
            const res = await api.put('/college/1', data);
            if (res?.ok) utils.toast('College info saved!', 'success');
            else utils.toast(res?.data?.message || 'Failed', 'error');
        }

        async function changePassword() {
            const data = utils.getFormData('password-form');
            const confirm = document.getElementById('confirm-password').value;
            if (data.new_password !== confirm) { utils.toast('Passwords do not match', 'error'); return; }
            const res = await api.post('/auth/change-password', data);
            if (res?.ok) { utils.toast('Password changed!', 'success'); document.getElementById('password-form').reset(); }
            else utils.toast(res?.data?.message || 'Failed', 'error');
        }

        init();
    </script>
</body>

</html>
